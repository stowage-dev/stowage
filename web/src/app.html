<!doctype html>
<html lang="en" data-theme="light" class="h-full">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>stowage</title>
		<script>
			// Apply persisted theme synchronously to avoid flash of light theme.
			try {
				const t = localStorage.getItem('stw-theme');
				if (t === 'dark' || t === 'light') {
					document.documentElement.dataset.theme = t;
				}
			} catch (_) {}
		</script>
		%sveltekit.head%
	</head>
	<body
		class="h-full bg-stw-bg font-stw-ui text-stw-fg antialiased"
		data-sveltekit-preload-data="hover"
	>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
