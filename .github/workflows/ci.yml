name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet, test, staticcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Ensure frontend placeholder exists
        run: |
          mkdir -p web/dist
          [ -f web/dist/index.html ] || echo '<!doctype html><title>stowage</title>' > web/dist/index.html

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  chart:
    name: Helm chart (lint + template)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Run chart tests
        run: go test -count=1 -timeout 5m ./test/chart/...

  e2e:
    name: e2e (kind, operator + s3proxy + webhook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Ensure frontend placeholder exists
        run: |
          mkdir -p web/dist
          [ -f web/dist/index.html ] || echo '<!doctype html><title>stowage</title>' > web/dist/index.html

      # helm/kind-action spins up a kind cluster, writes kubeconfig, and
      # exposes the cluster name for follow-up steps. Kind v0.26 is the
      # first release with kubernetes v1.32 node images; pin both so local
      # `make e2e` and CI run against the same matrix.
      - uses: helm/kind-action@v1
        with:
          version: v0.26.0
          node_image: kindest/node:v1.32.0
          cluster_name: stowage-e2e
          wait: 120s

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Bootstrap CRDs + host.docker.internal
        id: bootstrap
        run: |
          set -euo pipefail
          # Reuse the same bootstrap script the Makefile uses — it skips
          # cluster creation when one already exists (kind-action created
          # ours) and emits env exports we forward into GITHUB_ENV.
          ./scripts/e2e-bootstrap.sh | tee bootstrap.env
          # Strip the leading `export ` so GITHUB_ENV's KEY=VALUE syntax
          # accepts the lines verbatim.
          sed 's/^export //' bootstrap.env >> "$GITHUB_ENV"

      - name: Run e2e suite
        run: go test -tags e2e -timeout 15m -count=1 ./test/e2e/...

  frontend:
    name: SvelteKit (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build

  docker:
    name: Build & publish main image
    runs-on: ubuntu-latest
    needs: [go, chart, e2e, frontend]
    # Tag publishes are handled by oci-release.yml (multi-arch + signed).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
