name: Publish Helm chart

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: helm-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Package and publish chart to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ref='${{ inputs.tag }}'
          else
            ref="${GITHUB_REF_NAME}"
          fi
          # Chart and app versions must be SemVer 2 without a leading 'v'.
          version="${ref#v}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.ref }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2

      - name: Restore previously published charts
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          mkdir -p public
          if ! curl -fsSL -o /tmp/old-index.yaml "${PAGES_URL}/index.yaml"; then
            echo "No existing index.yaml; starting fresh"
            exit 0
          fi
          echo "Found existing index.yaml; restoring referenced tarballs"
          # Each Pages deploy replaces the whole site, so previously
          # published .tgz files vanish unless we re-upload them. Pull
          # every URL the old index references; entries whose tarball
          # is gone get dropped so the regenerated index stays honest.
          mapfile -t urls < <(yq -r '.entries[][].urls[]' /tmp/old-index.yaml)
          for url in "${urls[@]}"; do
            [ -z "$url" ] && continue
            fname=$(basename "$url")
            [ -f "public/$fname" ] && continue
            if curl -fsSL -o "public/$fname" "$url"; then
              echo "  restored $fname"
            else
              echo "  drop (missing) $fname"
              rm -f "public/$fname"
            fi
          done

      - name: Package chart
        env:
          CHART_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          mkdir -p .cr-release-packages
          helm dependency update deploy/chart
          helm package deploy/chart \
            --destination .cr-release-packages \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_VERSION}"

      - name: Update chart repository index
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          cp .cr-release-packages/*.tgz public/
          # Regenerate from scratch (no --merge) so entries whose .tgz
          # was missing in the restore step don't get re-added.
          helm repo index public --url "${PAGES_URL}"

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v5
