version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - deps
      - go
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - deps
      - frontend
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - deps
      - ci
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: weekly
    labels:
      - deps
      - docker
    commit-message:
      prefix: chore
      include: scope
