version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - deps
      - go
    commit-message:
      prefix: chore
      include: scope
    groups:
      go-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - deps
      - frontend
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - deps
      - ci
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: weekly
    labels:
      - deps
      - docker
    commit-message:
      prefix: chore
      include: scope
    groups:
      docker-all:
        patterns:
          - "*"
