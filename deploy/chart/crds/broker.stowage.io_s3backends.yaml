apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: s3backends.broker.stowage.io
spec:
  group: broker.stowage.io
  names:
    kind: S3Backend
    listKind: S3BackendList
    plural: s3backends
    singular: s3backend
    shortNames: [s3b]
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Buckets
          type: integer
          jsonPath: .status.bucketCount
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [endpoint, adminCredentialsSecretRef]
              properties:
                endpoint:
                  type: string
                  pattern: ^https?://.+
                region:
                  type: string
                  default: us-east-1
                addressingStyle:
                  type: string
                  enum: [path, virtual]
                  default: path
                quobjectsStorageSpace:
                  type: string
                  pattern: ^[^\s]+$
                adminCredentialsSecretRef:
                  type: object
                  required: [name, namespace]
                  properties:
                    name: {type: string, minLength: 1}
                    namespace: {type: string, minLength: 1}
                    accessKeyField: {type: string, default: AWS_ACCESS_KEY_ID}
                    secretKeyField: {type: string, default: AWS_SECRET_ACCESS_KEY}
                tls:
                  type: object
                  properties:
                    insecureSkipVerify: {type: boolean, default: false}
                    caBundleSecretRef:
                      type: object
                      required: [name, namespace]
                      properties:
                        name: {type: string, minLength: 1}
                        namespace: {type: string, minLength: 1}
                        key: {type: string, default: ca.crt}
                bucketNameTemplate:
                  type: string
                  default: "{{ .Namespace }}-{{ .Name }}"
            status:
              type: object
              properties:
                observedGeneration: {type: integer}
                bucketCount: {type: integer}
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason]
                    properties:
                      type: {type: string}
                      status: {type: string, enum: ["True", "False", "Unknown"]}
                      lastTransitionTime: {type: string, format: date-time}
                      reason: {type: string}
                      message: {type: string}
                      observedGeneration: {type: integer}
