# Stowage chart — deploys the dashboard, embedded S3 SigV4 proxy, and the
# operator wired together in one Pod. Override only what you need; every
# other knob is rendered with a working default by the templates.
#
# The chart deploys into the Helm release namespace. Pick it at install time
# with `helm install stowage ./chart -n stowage-system --create-namespace`.
#
# Topology: single replica only. Stowage is backed by SQLite on an RWO PVC
# and an in-process rate-limiter / audit batcher; running two pods would
# corrupt the database and double-execute reconciles. The chart hardcodes
# replicas: 1 with strategy: Recreate. Multi-replica is not supported and
# is not on the roadmap; deploy a second cluster instead if you need HA.

image:
  registry: ghcr.io/stowage-dev
  tag: dev
  pullPolicy: Always
  # Names of existing dockerconfigjson Secrets in the release namespace to attach
  # as imagePullSecrets on every Pod. The chart does not create these.
  pullSecrets: []

# Persistent volume that backs the SQLite store. Stowage runs as a single
# replica (SQLite + in-process limiter), so RWO is sufficient.
storage:
  size: 1Gi
  # Empty = cluster default StorageClass.
  storageClassName: ""

# Optional Ingress for the dashboard. Stowage expects to sit behind a
# TLS-terminating proxy.
ingress:
  enabled: true
  className: ""
  host: "stowage.rke2-prod.mustard.co.nz"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls: true

# Verbatim YAML merged on top of the chart's generated stowage config.yaml.
# Use this for OIDC, audit sampling, rate-limit overrides, host suffixes,
# and any other knob the chart doesn't expose directly.
config: {}

# Override the AES-256 root key (32 bytes encoded as 64 hex chars or
# 44-char base64). Empty = the chart generates one on first install and
# preserves it across upgrades via `helm lookup`.
secretKey: ""

# Admission webhook for S3Backend / BucketClaim CRDs. Disabling skips
# webhook + cert rendering entirely.
webhook:
  enabled: true
  failurePolicy: Fail
  selfSigned:
    enabled: true
    validityDays: 3650
  certManager:
    enabled: false
    issuerRef:
      kind: Issuer
      name: ""
  caBundle: ""

# Master switch for the chart. When false, no Deployment, Service, RBAC,
# config, or webhook is rendered (only the CRDs in chart/crds/ install).
stowage:
  enabled: true

# Embed the controller-runtime operator manager inside the stowage pod.
# When true, the same pod reconciles S3Backend / BucketClaim CRs, serves
# the admission webhook, and writes consumer Secrets across namespaces;
# this also widens RBAC to cluster scope. When false, the pod runs only
# the dashboard + S3 proxy and Kubernetes RBAC stays namespace-scoped.
operator:
  enabled: true

networkPolicy:
  enabled: false

# /metrics is always served at :8080/metrics on the main HTTP listener.
# This block controls how external scrapers discover it.
metrics:
  # When true, adds prometheus.io/scrape, /port, and /path annotations
  # to the Pod so a Prometheus instance configured for pod auto-discovery
  # picks up /metrics automatically. Leave false when you scrape via a
  # ServiceMonitor or static targets.
  prometheusScrape: true
