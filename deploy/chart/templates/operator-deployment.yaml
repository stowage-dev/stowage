{{- if .Values.operator.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stowage-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stowage.operatorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "stowage.operatorSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stowage.operatorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: stowage-operator
      {{- with (include "stowage.imagePullSecrets" . | trim) }}
      {{ . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # fsGroup makes Secret volumes group-readable by 65532 so the
        # non-root container can read tls.crt / tls.key at 0440.
        fsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: operator
          image: "{{ .Values.image.registry }}/stowage-operator:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect=true
            - --operator-namespace={{ .Release.Namespace }}
            - --proxy-endpoint={{ include "stowage.proxyEndpointURL" . }}
            - --enable-webhooks={{ .Values.webhook.enabled }}
            - --webhook-cert-dir=/etc/stowage-operator/webhook/certs
          ports:
            - name: metrics
              containerPort: 9090
            - name: health
              containerPort: 8081
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: 9443
            {{- end }}
          readinessProbe:
            httpGet: {path: /readyz, port: health}
          livenessProbe:
            httpGet: {path: /healthz, port: health}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: {drop: [ALL]}
          {{- if .Values.webhook.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/stowage-operator/webhook/certs
              readOnly: true
          {{- end }}
      {{- if .Values.webhook.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: stowage-operator-webhook-cert
            defaultMode: 0440
      {{- end }}
{{- end }}
