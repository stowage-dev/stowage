{{- if .Values.stowage.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stowage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stowage.dashboardLabels" . | nindent 4 }}
spec:
  replicas: 1
  # SQLite on a RWO volume + in-process rate-limiter / audit batcher.
  # The single-replica constraint is structural; do not raise this.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "stowage.dashboardSelector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stowage.dashboardLabels" . | nindent 8 }}
      annotations:
        # Roll the Pod when the rendered config or sealing key changes.
        checksum/config: {{ include (print $.Template.BasePath "/stowage-config.yaml") . | sha256sum }}
        checksum/secret-key: {{ include "stowage.secretKey" . | sha256sum }}
        {{- if and .Values.operator.enabled .Values.webhook.enabled }}
        checksum/webhook-cert: {{ include "stowage.webhookCABundle" . | sha256sum }}
        {{- end }}
        {{- if .Values.metrics.prometheusScrape }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      serviceAccountName: stowage
      {{- with (include "stowage.imagePullSecrets" . | trim) }}
      {{ . | nindent 6 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # fsGroup makes Secret volumes group-readable by 65532 so the
        # non-root container can read tls.crt / tls.key at 0440.
        fsGroup: 65532
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: stowage
          image: "{{ .Values.image.registry }}/stowage:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config=/etc/stowage/config.yaml
          env:
            - name: STOWAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stowage-secret-key
                  key: STOWAGE_SECRET_KEY
          ports:
            - name: http
              containerPort: 8080
            - name: s3
              containerPort: 8090
            {{- if and .Values.operator.enabled .Values.webhook.enabled }}
            - name: webhook
              containerPort: 9443
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/stowage
              readOnly: true
            - name: data
              mountPath: /data
            {{- if and .Values.operator.enabled .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /etc/stowage/webhook/certs
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits:   {cpu: 500m, memory: 256Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
      volumes:
        - name: config
          configMap:
            name: stowage-config
        - name: data
          persistentVolumeClaim:
            claimName: stowage-data
        {{- if and .Values.operator.enabled .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: stowage-webhook-cert
            defaultMode: 0440
        {{- end }}
{{- end }}
