{{- if .Values.stowage.enabled -}}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: stowage-secret-key
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "stowage.dashboardLabels" . | nindent 4 }}
  annotations:
    # The chart preserves an existing key across upgrades via
    # `helm lookup`. Keep this annotation as a hint that the value is
    # load-bearing — losing it bricks every UI-managed endpoint secret
    # the running install has sealed.
    "helm.sh/resource-policy": keep
data:
  STOWAGE_SECRET_KEY: {{ include "stowage.secretKey" . | b64enc | quote }}
{{- end }}
