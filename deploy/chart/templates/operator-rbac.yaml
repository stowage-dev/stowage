{{- if .Values.operator.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stowage-operator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "stowage.operatorLabels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: stowage-operator
  labels:
    {{- include "stowage.operatorLabels" . | nindent 4 }}
rules:
  - apiGroups: [broker.stowage.io]
    resources: [s3backends, bucketclaims]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [broker.stowage.io]
    resources: [s3backends/status, bucketclaims/status]
    verbs: [get, update, patch]
  - apiGroups: [broker.stowage.io]
    resources: [bucketclaims/finalizers]
    verbs: [update]
  # Cluster-scoped Secret access: consumer Secrets land in tenant namespaces.
  # Internal Secrets (admin + virtual creds + webhook TLS) all live in
  # .Values.namespace, but the consumer-side writer needs to reach arbitrary
  # namespaces.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stowage-operator
  labels:
    {{- include "stowage.operatorLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stowage-operator
subjects:
  - kind: ServiceAccount
    name: stowage-operator
    namespace: {{ .Values.namespace }}
{{- end }}
