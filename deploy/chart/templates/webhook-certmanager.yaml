{{- if and .Values.stowage.enabled .Values.operator.enabled .Values.webhook.enabled .Values.webhook.certManager.enabled }}
{{- if not .Values.webhook.certManager.issuerRef.name }}
# Chart-managed self-signed Issuer for clusters that have cert-manager but
# no pre-existing Issuer to delegate to.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: stowage-webhook-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stowage.dashboardLabels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stowage-webhook-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stowage.dashboardLabels" . | nindent 4 }}
spec:
  secretName: stowage-webhook-cert
  dnsNames:
    - stowage.{{ .Release.Namespace }}
    - stowage.{{ .Release.Namespace }}.svc
    - stowage.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: {{ .Values.webhook.certManager.issuerRef.kind }}
    name: {{ .Values.webhook.certManager.issuerRef.name | default "stowage-webhook-selfsigned" }}
{{- end }}
